<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xoho Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --card: #20243a; --border: #2e3347;
    --text: #e8eaf6; --muted: #8b93b0;
    --green: #4caf7d; --orange: #f59e0b; --red: #ef4444;
    --blue: #6366f1; --accent: #a78bfa;
  }
  body { font-family: 'Segoe UI', 'Arial Hebrew', sans-serif; background: var(--bg); color: var(--text); direction: rtl; }

  #paywall { position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000; }
  .paywall-box { background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 48px;text-align:center;max-width:380px;width:90%; }
  .paywall-logo { font-size:2.2rem;font-weight:900;letter-spacing:-1px;margin-bottom:6px; }
  .paywall-logo span { color:var(--accent); }
  .paywall-sub { color:var(--muted);font-size:0.9rem;margin-bottom:28px; }
  .paywall-input { width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:1rem;text-align:center;letter-spacing:2px;outline:none;margin-bottom:12px;direction:ltr; }
  .paywall-input:focus { border-color:var(--accent); }
  .paywall-btn { width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-size:1rem;font-weight:700;cursor:pointer; }
  .paywall-btn:hover { opacity:0.85; }
  .paywall-err { color:var(--red);font-size:0.85rem;min-height:20px;margin-top:8px; }

  #main { display:none; }
  .header { background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between; }
  .logo { font-size:1.5rem;font-weight:900; }
  .logo span { color:var(--accent); }
  .header-meta { color:var(--muted);font-size:0.82rem;text-align:left;direction:ltr; }

  .tabs { display:flex;gap:4px;padding:16px 28px 0;border-bottom:1px solid var(--border);background:var(--surface); overflow-x: auto;}
  .tab { padding:9px 20px;border-radius:8px 8px 0 0;cursor:pointer;font-size:0.9rem;color:var(--muted);border:1px solid transparent;border-bottom:none;transition:all .2s; white-space: nowrap;}
  .tab.active { background:var(--bg);color:var(--text);border-color:var(--border);font-weight:600; }
  .tab:hover:not(.active) { color:var(--text);background:rgba(255,255,255,.04); }

  .page { display:none;padding:28px; }
  .page.active { display:block; }

  .kpi-grid { display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:24px; }
  .kpi { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px;position:relative;overflow:hidden; }
  .kpi::before { content:'';position:absolute;top:0;right:0;width:4px;height:100%;border-radius:0 12px 12px 0; }
  .kpi.blue::before { background:var(--blue); }
  .kpi.green::before { background:var(--green); }
  .kpi.orange::before { background:var(--orange); }
  .kpi.purple::before { background:var(--accent); }
  .kpi.teal::before { background:#2dd4bf; }
  .kpi-label { font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px; }
  .kpi-value { font-size:1.85rem;font-weight:800;line-height:1;margin-bottom:4px; }
  .kpi-sub { font-size:0.8rem;color:var(--muted); }

  .prime-section { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px; }
  .prime-title { font-size:0.82rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px; }
  .prime-number { font-size:3.2rem;font-weight:900;text-align:center;margin:6px 0 10px; }
  .prime-bar-wrap { background:var(--card);border-radius:8px;height:14px;overflow:hidden;margin-bottom:6px; }
  .prime-bar { height:100%;border-radius:8px;transition:width .8s; }
  .prime-labels { display:flex;justify-content:space-between;font-size:0.75rem;color:var(--muted);margin-bottom:12px; }
  .prime-breakdown { display:flex;gap:32px;justify-content:center; }
  .prime-item { text-align:center; }
  .prime-item-val { font-size:1.3rem;font-weight:700; }
  .prime-item-label { font-size:0.75rem;color:var(--muted);margin-top:2px; }

  .chart-section { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px; }
  .chart-title { font-size:0.9rem;font-weight:600;margin-bottom:16px; }

  .vtable { width:100%;border-collapse:collapse; }
  .vtable th { text-align:right;padding:10px 14px;font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border); }
  .vtable td { padding:11px 14px;font-size:0.88rem;border-bottom:1px solid rgba(46,51,71,.5); }
  .vtable tr:last-child td { border-bottom:none; }
  .vtable tr:hover td { background:rgba(255,255,255,.02); }
</style>
</head>
<body>

<div id="paywall">
  <div class="paywall-box">
    <div class="paywall-logo">X<span>oho</span></div>
    <div class="paywall-sub">Dashboard · SmartPlate</div>
    <div style="position:relative; width: 100%; max-width: 320px; margin: 0 auto; margin-bottom: 24px;">
      <input class="paywall-input" id="codeInput" type="password" placeholder="הזן קוד גישה" autocomplete="off" style="width: 100%; padding-left: 45px; box-sizing: border-box; margin-bottom: 0;">
      <button type="button" onclick="togglePassword()" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--muted); outline: none;">👁️</button>
    </div>
    <button class="paywall-btn" onclick="checkCode()">כניסה →</button>
    <div class="paywall-err" id="codeErr"></div>
  </div>
</div>

<div id="main">
  <div class="header">
    <div class="logo">X<span>oho</span> <span style="font-size:.95rem;font-weight:400;color:var(--muted)">Dashboard</span></div>
    <div class="header-meta">
      <div id="hDate"></div>
      <div id="hUpd"></div>
    </div>
  </div>
  <div class="tabs" id="tabs-container">
    <div class="tab active" id="tab-btn-jul" onclick="showMonth('jul')">יולי 2026 — MTD</div>
    <div class="tab" id="tab-btn-jun" onclick="showMonth('jun')">יוני 2026</div>
  </div>

  <div class="page active" id="tab-content">
    <div class="kpi-grid">
      <div class="kpi blue">
        <div class="kpi-label">מכירות ברוטו</div>
        <div class="kpi-value" id="k-svat">—</div>
        <div class="kpi-sub" id="k-days">— ימים</div>
      </div>
      <div class="kpi green">
        <div class="kpi-label">מכירות נטו</div>
        <div class="kpi-value" id="k-snet">—</div>
        <div class="kpi-sub">÷ 1.18</div>
      </div>
      <div class="kpi orange">
        <div class="kpi-label">שכר עבודה</div>
        <div class="kpi-value" id="k-labor">—</div>
        <div class="kpi-sub" id="k-lpct">—% נטו</div>
      </div>
      <div class="kpi purple">
        <div class="kpi-label">עלות מזון (נטו)</div>
        <div class="kpi-value" id="k-food">—</div>
        <div class="kpi-sub" id="k-fpct">—</div>
      </div>
      <div class="kpi teal">
        <div class="kpi-label">שעות עבודה</div>
        <div class="kpi-value" id="k-hours">—</div>
        <div class="kpi-sub">שעות חודש</div>
      </div>
    </div>

    <div class="prime-section">
      <div class="prime-title">⚡ Prime Cost = שכר + מזון &nbsp;|&nbsp; יעד: 60%</div>
      <div class="prime-number" id="p-num">—</div>
      <div class="prime-bar-wrap"><div class="prime-bar" id="p-bar" style="width:0"></div></div>
      <div class="prime-labels"><span>0%</span><span style="color:var(--green)">60%✓</span><span>70%</span><span>80%</span><span>100%</span></div>
      <div class="prime-breakdown">
        <div class="prime-item"><div class="prime-item-val" id="pb-l">—</div><div class="prime-item-label">שכר %</div></div>
        <div class="prime-item" style="color:var(--border);font-size:1.5rem;padding-bottom:6px">+</div>
        <div class="prime-item"><div class="prime-item-val" id="pb-f">—</div><div class="prime-item-label">מזון %</div></div>
        <div class="prime-item" style="color:var(--border);font-size:1.5rem;padding-bottom:6px">=</div>
        <div class="prime-item"><div class="prime-item-val" id="pb-t">—</div><div class="prime-item-label">Prime Cost</div></div>
      </div>
    </div>

    <div class="chart-section" id="daily-chart-section">
      <div class="chart-title">מכירות יומיות</div>
      <canvas id="dailyChart" height="75"></canvas>
    </div>
  </div>
</div>

let currentMonth = 'jul';
let chartInst = null;

function togglePassword() {
  const input = document.getElementById("codeInput");
  input.type = input.type === "password" ? "text" : "password";
}

function checkCode(){
  const v = document.getElementById("codeInput").value.trim().toUpperCase();
  if(v === "XOHO2026" || v === "SMARTPLATE" || v.replace(/\s/g, '') === "SMARTPLATE") {
    localStorage.setItem("xoho_ok","1");
    document.getElementById("paywall").style.display="none";
    document.getElementById("main").style.display="block";
    showMonth(currentMonth);
  } else {
    document.getElementById("codeErr").textContent="קוד שגוי";
    setTimeout(()=>document.getElementById("codeErr").textContent="",2000);
  }
}
document.getElementById("codeInput").addEventListener("keydown",e=>{if(e.key==="Enter")checkCode();});
if(localStorage.getItem("xoho_ok")==="1"){
  document.getElementById("paywall").style.display="none";
  document.getElementById("main").style.display="block";
  setTimeout(()=>showMonth(currentMonth), 50);
}

function showMonth(m){
  currentMonth = m;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("tab-btn-"+m).classList.add("active");
  render(DATA[m]);
}

function fmt(n){ return "₪"+Math.round(n).toLocaleString("he-IL"); }
function pc(n){ return n.toFixed(1)+"%"; }
function color(pct){ return pct<=60?"var(--green)":pct<=70?"var(--orange)":"var(--red)"; }

function render(d){
  if(!d) return;

  const salesNet = Math.round(d.total_sales_vat / 1.18);
  const laborPct = salesNet > 0 ? (d.labor_cost / salesNet * 100) : 0;
  
  // Try to use approved net, fallback to generic food cost
  const foodNet = d.food_cost_approved_net || d.food_cost_net || 0;
  const foodPct = salesNet > 0 ? (foodNet / salesNet * 100) : 0;
  
  const prime = laborPct + foodPct;

  document.getElementById("hDate").innerHTML = "<strong>" + d.label + "</strong>";
  document.getElementById("hUpd").textContent = "Tabit: " + (d.last_updated || "—");

  document.getElementById("k-svat").textContent = fmt(d.total_sales_vat);
  document.getElementById("k-days").textContent = d.days_collected+" ימי נתונים";
  document.getElementById("k-snet").textContent = fmt(salesNet);
  document.getElementById("k-labor").textContent = fmt(d.labor_cost);
  document.getElementById("k-lpct").textContent = pc(laborPct)+" ממכירות נטו";
  document.getElementById("k-hours").textContent = Math.round(d.labor_hours || 0).toLocaleString()+" ש'";

  if(d.food_cost_net > 0){
    const pctOrd = (d.food_cost_net / salesNet * 100).toFixed(1);
    const pctApp = (d.food_cost_approved_net / salesNet * 100).toFixed(1);
    const gapAmt = d.food_cost_net - d.food_cost_approved_net;
    const gapPct = (gapAmt / d.food_cost_net * 100).toFixed(1);
    
    document.getElementById("k-food").innerHTML = `
      <div style="font-size:1.1rem">הוזמן: ${fmt(d.food_cost_net)}</div>
      <div style="font-size:1.1rem;color:var(--green);margin-top:2px">התקבל: ${fmt(d.food_cost_approved_net)}</div>
      <div style="font-size:0.9rem;color:var(--orange);margin-top:4px;border-top:1px solid var(--border);padding-top:4px">פער ממתין: ${fmt(gapAmt)}</div>
    `;
    document.getElementById("k-fpct").innerHTML = `
      <span style="color:var(--orange)">פער (Gap): ${gapPct}%</span> מההזמנות
    `;
  } else {
    document.getElementById("k-food").textContent = fmt(0);
    document.getElementById("k-fpct").textContent = "0%";
  }

  document.getElementById("p-num").textContent = pc(prime);
  document.getElementById("p-num").style.color = color(prime);
  document.getElementById("p-bar").style.width = Math.min(prime,100)+"%";
  document.getElementById("p-bar").style.background = color(prime);

  document.getElementById("pb-l").textContent = pc(laborPct);
  document.getElementById("pb-f").textContent = pc(foodPct);
  document.getElementById("pb-t").textContent = pc(prime);

  // CHART
  if(d.daily_sales && d.daily_sales.length > 0){
    document.getElementById("daily-chart-section").style.display="block";
    const daily = d.daily_sales;
    if(chartInst) chartInst.destroy();
    chartInst = new Chart(document.getElementById("dailyChart"), {
      type: "bar",
      data: {
        labels: daily.map(x=>x.date.substring(8,10)),
        datasets: [{
          label: "מכירות (ברוטו)",
          data: daily.map(x=>x.amount),
          backgroundColor: "#6366f1",
          borderRadius: 4
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: {display:false} },
        scales: {
          x: { grid: {display:false}, ticks: {color:"#8b93b0",font:{family:"'Segoe UI',sans-serif"}} },
          y: { border: {display:false}, grid: {color:"#2e3347"}, ticks: {color:"#8b93b0",font:{family:"'Segoe UI',sans-serif"}} }
        }
      }
    });
  } else {
    document.getElementById("daily-chart-section").style.display="none";
  }
}
</script>

</html>
